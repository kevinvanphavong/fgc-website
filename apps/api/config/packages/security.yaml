security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # ROLE_ADMIN hérite de ROLE_MANAGER qui hérite de ROLE_STAFF.
    # ROLE_STAFF = accès minimum à l'API back-office.
    role_hierarchy:
        ROLE_MANAGER: ROLE_STAFF
        ROLE_ADMIN: [ROLE_MANAGER, ROLE_USER]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Login JSON pour le back-office Next.js → produit un JWT via Lexik.
        api_login:
            pattern: ^/api/auth/login$
            stateless: true
            provider: app_user_provider
            user_checker: App\Security\AppUserChecker
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Reste de l'API : stateless, JWT.
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth, roles: ROLE_STAFF }
        - { path: ^/api/admin/users, roles: ROLE_ADMIN }
        - { path: ^/api/admin, roles: ROLE_STAFF }
        # `^/api/me(/|$)` indispensable : `^/api/me` matcherait aussi `/api/menu_sections` (préfixe).
        - { path: ^/api/me(/|$), roles: ROLE_CLIENT }
        - { path: ^/api, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
