name: api-tests

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-tests.yml'
  push:
    branches: [main]
    paths:
      - 'apps/api/**'

defaults:
  run:
    working-directory: apps/api

jobs:
  phpunit:
    name: PHPUnit (Symfony 7.2 / PHP 8.3+ / Postgres 16)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 8

    env:
      # On bascule l'URL pour pointer sur le service postgres CI.
      # Le suffixe `_test` est appliqué automatiquement par doctrine
      # (cf. config/packages/doctrine.yaml when@test) → DB effective : app_test.
      DATABASE_URL: "postgresql://app:app@127.0.0.1:5432/app?serverVersion=16&charset=utf8"
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ctype, iconv, intl, pdo_pgsql
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPUnit
        run: bin/test-api
